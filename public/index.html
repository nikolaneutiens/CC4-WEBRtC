<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Survive With the Light</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #0b0d12;
      color: #e9ecf1;
      font-family: Arial, sans-serif;
    }

    #waiting-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: #0b0d12 url('/assets/img/background.png') center center / cover no-repeat;
      z-index: 5;
    }

    #title {
      margin: 0 0 16px;
      font-size: 2.2rem;
      color: #f7f9ff;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.35);
    }

    #intro {
      max-width: 560px;
      margin: 0 18px 14px;
      line-height: 1.45;
      font-size: 1.05rem;
      color: #c4cbdb;
    }

    #enableSoundBtn {
      margin-top: 12px;
      padding: 10px 14px;
      border: 2px solid #6f7a93;
      background: #141925;
      color: #eaf0ff;
      font-weight: bold;
      display: inline-block;
      cursor: pointer;
    }

    #qr {
      margin-top: 4px;
    }

    #qr img {
      background: #fff;
      padding: 8px;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #game-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: none;
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      color: #fff;
      font-size: 1.2rem;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(0, 0, 0, 0.8);
      z-index: 3;
      display: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      display: none;
    }

    #death-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      color: #fff;
      background: rgba(0, 0, 0, 0.72);
      z-index: 4;
    }

    #death-screen h2 {
      margin: 0 0 10px;
      font-size: 2.2rem;
    }

    #jumpscare-screen {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 6;
      background: #000 url('/assets/img/jumpscare.png') center center / cover no-repeat;
    }
  </style>
</head>

<body>
  <div id="waiting-screen">
    <h1 id="title">Survive With the Light</h1>
    <p id="intro">Use your flashlight to shine away the monsters, try to survive for as long as possible. You'll surely
      die.</p>
    <div id="qr"></div>
    <button id="enableSoundBtn">ENABLE SOUND</button>
  </div>

  <canvas id="game-canvas"></canvas>
  <div id="hud">Time Alive: <span id="timer">0.0</span>s</div>
  <div id="overlay"></div>
  <div id="death-screen">
    <h2>You Died</h2>
    <p>You survived <span id="death-time">0.0</span> seconds.</p>
    <p>Tap restart on your phone to try again.</p>
  </div>
  <div id="jumpscare-screen"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

  <script>
    const waitingScreenEl = document.getElementById('waiting-screen');
    const qrEl = document.getElementById('qr');
    const enableSoundBtn = document.getElementById('enableSoundBtn');
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const overlayEl = document.getElementById('overlay');
    const deathScreenEl = document.getElementById('death-screen');
    const deathTimeEl = document.getElementById('death-time');
    const jumpscareEl = document.getElementById('jumpscare-screen');
    const hudEl = document.getElementById('hud');
    const timerEl = document.getElementById('timer');

    const socket = io();
    let peer;
    let phoneId = null;

    const MONSTER_SPRITE_PATH = '/assets/img/spritesheet/monster__sheet.png';
    const BACKGROUND_IMAGE_PATH = '/assets/img/background.png';
    const JUMPSCARE_SOUND_PATH = '/assets/sound/jumpscare.mp3';
    const MONSTER_SPRITE_COLUMNS = 8;
    const MONSTER_SPRITE_ROWS = 8;
    const MONSTER_SPRITE_FRAME_COUNT = 60;
    const MONSTER_SPRITE_FPS = 30;

    const FLASHLIGHT_MAX_RADIUS = 290;
    const FLASHLIGHT_MIN_RADIUS = 150;
    const FLASHLIGHT_DRAIN_PER_SECOND = 1.3;

    const monsterSprite = new Image();
    let monsterSpriteReady = false;
    monsterSprite.onload = () => {
      monsterSpriteReady = true;
    };
    monsterSprite.onerror = () => {
      monsterSpriteReady = false;
    };
    monsterSprite.src = MONSTER_SPRITE_PATH;

    const backgroundImage = new Image();
    let backgroundImageReady = false;
    backgroundImage.onload = () => {
      backgroundImageReady = true;
    };
    backgroundImage.onerror = () => {
      backgroundImageReady = false;
    };
    backgroundImage.src = BACKGROUND_IMAGE_PATH;

    const jumpscareAudio = new Audio(JUMPSCARE_SOUND_PATH);
    jumpscareAudio.preload = 'auto';
    jumpscareAudio.volume = 1;
    let jumpscareAudioUnlocked = false;

    const unlockJumpscareAudio = () => {
      if (jumpscareAudioUnlocked) {
        enableSoundBtn.textContent = 'SOUND ENABLED';
        return;
      }
      jumpscareAudio.muted = true;
      jumpscareAudio.play()
        .then(() => {
          jumpscareAudio.pause();
          jumpscareAudio.currentTime = 0;
          jumpscareAudio.muted = false;
          jumpscareAudioUnlocked = true;
          enableSoundBtn.textContent = 'SOUND ENABLED';
        })
        .catch(() => {
          enableSoundBtn.textContent = 'ENABLE SOUND';
        });
    };

    window.addEventListener('pointerdown', unlockJumpscareAudio, { once: true });
    window.addEventListener('keydown', unlockJumpscareAudio, { once: true });
    enableSoundBtn.addEventListener('click', unlockJumpscareAudio);

    const playJumpscareSound = () => {
      if (!jumpscareAudioUnlocked) {
        enableSoundBtn.textContent = 'ENABLE SOUND';
      }
      jumpscareAudio.currentTime = 0;
      jumpscareAudio.play().catch(() => {
        const fallbackAudio = new Audio(JUMPSCARE_SOUND_PATH);
        fallbackAudio.volume = 1;
        fallbackAudio.play().catch(() => {
        });
      });
    };

    let cursorX = window.innerWidth / 2;
    let cursorY = window.innerHeight * 0.75;
    let lastAlpha = null;

    let monsters = [];
    let gameRunning = false;
    let isDead = false;
    let gameStartMs = 0;
    let lastFrameMs = 0;
    let lastSpawnMs = 0;
    let frameId = null;
    let flashlightRadius = FLASHLIGHT_MAX_RADIUS;
    let lastBatterySentAt = 0;
    let lastBatterySentLevel = -1;
    let jumpscareTimeoutId = null;
    let currentGameSessionId = 0;

    const resizeCanvas = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cursorX = Math.max(0, Math.min(canvas.width, cursorX));
      cursorY = Math.max(0, Math.min(canvas.height, cursorY));
    };

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const setWaitingState = () => {
      isDead = false;
      if (jumpscareTimeoutId !== null) {
        clearTimeout(jumpscareTimeoutId);
        jumpscareTimeoutId = null;
      }
      waitingScreenEl.style.display = 'flex';
      canvas.style.display = 'none';
      overlayEl.style.display = 'none';
      overlayEl.style.background = '';
      hudEl.style.display = 'none';
      deathScreenEl.style.display = 'none';
      jumpscareEl.style.display = 'none';
      jumpscareAudio.pause();
      jumpscareAudio.currentTime = 0;
      document.body.style.backgroundColor = '#0b0d12';
      document.body.style.color = '#e9ecf1';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    };

    const setActiveState = () => {
      waitingScreenEl.style.display = 'none';
      canvas.style.display = 'block';
      overlayEl.style.display = 'block';
      hudEl.style.display = 'block';
      deathScreenEl.style.display = 'none';
      jumpscareEl.style.display = 'none';
      document.body.style.backgroundColor = '#111';
      document.body.style.color = '#fff';
    };

    const setDeathState = survivedSeconds => {
      if (!gameRunning || !peer || !peer.connected) {
        return;
      }
      if (isDead) {
        return;
      }
      const deathSessionId = currentGameSessionId;
      gameRunning = false;
      isDead = true;
      if (frameId !== null) {
        cancelAnimationFrame(frameId);
        frameId = null;
      }
      overlayEl.style.display = 'none';
      hudEl.style.display = 'none';
      deathTimeEl.textContent = survivedSeconds.toFixed(1);
      jumpscareEl.style.display = 'flex';
      deathScreenEl.style.display = 'none';

      playJumpscareSound();

      if (jumpscareTimeoutId !== null) {
        clearTimeout(jumpscareTimeoutId);
      }
      jumpscareTimeoutId = setTimeout(() => {
        if (deathSessionId !== currentGameSessionId) {
          return;
        }
        jumpscareEl.style.display = 'none';
        deathScreenEl.style.display = 'flex';
      }, 1200);

      if (peer && peer.connected) {
        peer.send(JSON.stringify({ type: 'gameOver' }));
        peer.send(JSON.stringify({ type: 'battery', level: 0 }));
      }
    };

    const sendBatteryLevel = (nowMs, force = false) => {
      if (!peer || !peer.connected) {
        return;
      }

      const ratio = (flashlightRadius - FLASHLIGHT_MIN_RADIUS) / (FLASHLIGHT_MAX_RADIUS - FLASHLIGHT_MIN_RADIUS);
      const clampedRatio = Math.max(0, Math.min(1, ratio));
      const level = Math.round(clampedRatio * 100);

      if (!force) {
        const sentRecently = nowMs - lastBatterySentAt < 120;
        const tinyDelta = Math.abs(level - lastBatterySentLevel) < 1;
        if (sentRecently && tinyDelta) {
          return;
        }
      }

      lastBatterySentAt = nowMs;
      lastBatterySentLevel = level;
      peer.send(JSON.stringify({ type: 'battery', level }));
    };

    const updateFlashlight = nowMs => {
      const t = nowMs || performance.now();
      const sineFlicker = Math.sin(t * 0.02) * 2.2;
      const randomFlicker = (Math.random() - 0.5) * 1.6;
      const renderRadius = Math.max(FLASHLIGHT_MIN_RADIUS, flashlightRadius + sineFlicker + randomFlicker);
      overlayEl.style.background = `radial-gradient(circle ${renderRadius}px at ${cursorX}px ${cursorY}px, transparent 0%, transparent 35%, rgba(0,0,0,0.97) 100%)`;
    };

    const spawnMonster = elapsedSec => {
      const edge = Math.floor(Math.random() * 4);
      let x;
      let y;

      if (edge === 0) {
        x = Math.random() * canvas.width;
        y = -35;
      } else if (edge === 1) {
        x = canvas.width + 35;
        y = Math.random() * canvas.height;
      } else if (edge === 2) {
        x = Math.random() * canvas.width;
        y = canvas.height + 35;
      } else {
        x = -35;
        y = Math.random() * canvas.height;
      }

      monsters.push({
        x,
        y,
        radius: 12,
        health: 100,
        speed: 24 + elapsedSec * 0.55,
        growthRate: 2.5 + elapsedSec * 0.04,
        frameOffset: Math.floor(Math.random() * MONSTER_SPRITE_FRAME_COUNT)
      });
    };

    const drawGameBackground = () => {
      if (!backgroundImageReady) {
        ctx.fillStyle = '#88929a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        return;
      }

      const imageAspect = backgroundImage.width / backgroundImage.height;
      const canvasAspect = canvas.width / canvas.height;

      let drawWidth = canvas.width;
      let drawHeight = canvas.height;
      let offsetX = 0;
      let offsetY = 0;

      if (imageAspect > canvasAspect) {
        drawHeight = canvas.height;
        drawWidth = drawHeight * imageAspect;
        offsetX = (canvas.width - drawWidth) / 2;
      } else {
        drawWidth = canvas.width;
        drawHeight = drawWidth / imageAspect;
        offsetY = (canvas.height - drawHeight) / 2;
      }

      ctx.drawImage(backgroundImage, offsetX, offsetY, drawWidth, drawHeight);
    };

    const gameLoop = (nowMs, sessionId) => {
      if (!gameRunning || sessionId !== currentGameSessionId) {
        return;
      }

      const dt = Math.min(0.05, (nowMs - lastFrameMs) / 1000);
      lastFrameMs = nowMs;
      const elapsedSec = (nowMs - gameStartMs) / 1000;

      timerEl.textContent = elapsedSec.toFixed(1);
      flashlightRadius = Math.max(FLASHLIGHT_MIN_RADIUS, FLASHLIGHT_MAX_RADIUS - elapsedSec * FLASHLIGHT_DRAIN_PER_SECOND);

      const spawnIntervalMs = Math.max(900, 2300 - elapsedSec * 18);
      if (nowMs - lastSpawnMs >= spawnIntervalMs) {
        lastSpawnMs = nowMs;
        spawnMonster(elapsedSec);
      }

      drawGameBackground();

      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;

      monsters = monsters.filter(monster => {
        const dx = centerX - monster.x;
        const dy = centerY - monster.y;
        const distanceToCenter = Math.hypot(dx, dy) || 1;

        monster.x += (dx / distanceToCenter) * monster.speed * dt;
        monster.y += (dy / distanceToCenter) * monster.speed * dt;
        monster.radius += monster.growthRate * dt;

        const lightDist = Math.hypot(monster.x - cursorX, monster.y - cursorY);
        if (lightDist < 90) {
          monster.health -= 320 * dt;
          monster.radius -= 36 * dt;
        }

        if (monster.health <= 0 || monster.radius <= 4) {
          return false;
        }

        if (distanceToCenter < monster.radius + 14) {
          setDeathState(elapsedSec);
          return false;
        }

        if (monsterSpriteReady) {
          const animFrame = Math.floor(elapsedSec * MONSTER_SPRITE_FPS + monster.frameOffset) % MONSTER_SPRITE_FRAME_COUNT;
          const frameX = animFrame % MONSTER_SPRITE_COLUMNS;
          const frameY = Math.floor(animFrame / MONSTER_SPRITE_COLUMNS);
          const sourceWidth = monsterSprite.width / MONSTER_SPRITE_COLUMNS;
          const sourceHeight = monsterSprite.height / MONSTER_SPRITE_ROWS;

          const drawSize = monster.radius * 2.6;
          const fromRightSide = monster.x < centerX;

          if (fromRightSide) {
            ctx.save();
            ctx.translate(monster.x, monster.y);
            ctx.scale(-1, 1);
            ctx.drawImage(
              monsterSprite,
              frameX * sourceWidth,
              frameY * sourceHeight,
              sourceWidth,
              sourceHeight,
              -drawSize / 2,
              -drawSize / 2,
              drawSize,
              drawSize
            );
            ctx.restore();
          } else {
            ctx.drawImage(
              monsterSprite,
              frameX * sourceWidth,
              frameY * sourceHeight,
              sourceWidth,
              sourceHeight,
              monster.x - drawSize / 2,
              monster.y - drawSize / 2,
              drawSize,
              drawSize
            );
          }
        } else {
          ctx.beginPath();
          ctx.arc(monster.x, monster.y, monster.radius, 0, Math.PI * 2);
          ctx.fillStyle = '#000';
          ctx.fill();
        }
        return true;
      });

      updateFlashlight(nowMs);
      sendBatteryLevel(nowMs);
      frameId = requestAnimationFrame(nextMs => gameLoop(nextMs, sessionId));
    };

    const startGame = () => {
      if (gameRunning) {
        return;
      }

      setActiveState();
      currentGameSessionId += 1;
      const sessionId = currentGameSessionId;
      isDead = false;
      monsters = [];
      gameRunning = true;
      gameStartMs = performance.now();
      lastFrameMs = gameStartMs;
      lastSpawnMs = gameStartMs;
      flashlightRadius = FLASHLIGHT_MAX_RADIUS;
      lastBatterySentAt = 0;
      lastBatterySentLevel = -1;
      timerEl.textContent = '0.0';
      updateFlashlight(gameStartMs);
      sendBatteryLevel(gameStartMs, true);
      frameId = requestAnimationFrame(nextMs => gameLoop(nextMs, sessionId));
    };

    const resetToWaiting = () => {
      phoneId = null;
      lastAlpha = null;
      isDead = false;
      cursorX = window.innerWidth / 2;
      cursorY = window.innerHeight * 0.75;
      monsters = [];
      if (frameId !== null) {
        cancelAnimationFrame(frameId);
        frameId = null;
      }
      gameRunning = false;
      currentGameSessionId += 1;
      flashlightRadius = FLASHLIGHT_MAX_RADIUS;
      lastBatterySentAt = 0;
      lastBatterySentLevel = -1;
      setWaitingState();
    };

    const createPeer = () => {
      peer = new SimplePeer({ initiator: false, trickle: false });

      peer.on('signal', data => {
        if (phoneId) socket.emit('signal', phoneId, data);
      });

      peer.on('data', data => {
        const msg = JSON.parse(data.toString());

        if (msg.type === 'startGame') {
          startGame();
          return;
        }

        if (msg.type === 'restartGame') {
          if (isDead) {
            startGame();
          }
          return;
        }

        if (msg.type === 'gyro') {
          if (lastAlpha !== null) {
            let alphaDelta = msg.alpha - lastAlpha;
            if (alphaDelta > 180) alphaDelta -= 360;
            if (alphaDelta < -180) alphaDelta += 360;
            cursorX -= alphaDelta * 20;
          }
          lastAlpha = msg.alpha;

          const sensitivity = 3;
          cursorY = (window.innerHeight * 0.75) - msg.beta * (window.innerHeight / 180) * sensitivity;
          cursorX = Math.max(0, Math.min(window.innerWidth, cursorX));
          cursorY = Math.max(0, Math.min(window.innerHeight, cursorY));
          return;
        }
      });

      peer.on('error', err => console.error('Peer error:', err));
      peer.on('close', () => {
        resetToWaiting();
      });
    };

    socket.on('connect', () => {
      console.log('Connected to server:', socket.id);

      const mobileUrl = `${new URL(`/mobile.html?id=${socket.id}`, window.location)}`;

      const qr = qrcode(4, 'L');
      qr.addData(mobileUrl);
      qr.make();
      qrEl.innerHTML = qr.createImgTag(4);

      resetToWaiting();
      createPeer();
    });

    socket.on('signal', ({ signal, from }) => {
      if (!peer || peer.destroyed) {
        createPeer();
      }
      phoneId = from;
      peer.signal(signal);
    });

    socket.on('peer-disconnected', ({ id }) => {
      if (id !== phoneId) {
        return;
      }
      if (peer && !peer.destroyed) {
        peer.destroy();
      } else {
        resetToWaiting();
        createPeer();
      }
    });
  </script>
</body>

</html>
