<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone P2P Button</title>
</head>

<body>
  <h2>Phone</h2>
  <button id="startBtn">Start Gyro</button>
  <button id="sendBtn" disabled>Click Me</button>
  <p id="status">Waiting for P2P connection...</p>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const laptopId = urlParams.get('id');
    const socket = io();
    let peer;

    socket.on('connect', () => {
      console.log('Phone connected, Socket ID:', socket.id);

      // Create initiator peer - phone starts the handshake
      peer = new SimplePeer({ initiator: true, trickle: false });

      peer.on('signal', data => {
        socket.emit('signal', laptopId, data);
      });

      socket.on('signal', ({ signal }) => {
        peer.signal(signal);
      });

      peer.on('connect', () => {
        console.log('P2P connected to laptop');
        document.getElementById('status').textContent = 'Connected! Tap Start Gyro.';
        const btn = document.getElementById('sendBtn');
        btn.disabled = false;
        btn.addEventListener('click', () => {
          peer.send(JSON.stringify({ type: 'buttonClick' }));
          console.log('Sent buttonClick to laptop');
        });

        // iOS requires permission to be requested synchronously in a click handler
        document.getElementById('startBtn').addEventListener('click', () => {
          if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            // iOS 13+ - must be called synchronously, no await
            DeviceMotionEvent.requestPermission().then(permission => {
              if (permission !== 'granted') {
                alert('Gyro permission denied.');
                return;
              }
              startGyro();
            }).catch(err => console.error('Permission error:', err));
          } else {
            // Non-iOS, permission not needed
            startGyro();
          }
        });

        const startGyro = () => {
          document.getElementById('status').textContent = 'Gyro active!';
          window.addEventListener('deviceorientation', e => {
            if (peer && peer.connected) {
              peer.send(JSON.stringify({
                type: 'gyro',
                beta: e.beta,   // up/down tilt
                alpha: e.alpha  // compass heading for left/right
              }));
            }
          });
        };
      });

      peer.on('error', err => console.error('Peer error:', err));
    });
  </script>
</body>

</html>
