<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laptop P2P Button Logger</title>
</head>

<body>
  <h2>Laptop</h2>
  <a id="url" href=""></a>
  <div id="qr"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"></script>

  <script>
    const $url = document.getElementById('url');
    const socket = io();
    let peer;

    socket.on('connect', () => {
      console.log('Connected to server:', socket.id);

      // Generate QR code for phone
      const mobileUrl = `${new URL(`/mobile.html?id=${socket.id}`, window.location)}`;
      $url.textContent = mobileUrl;
      $url.href = mobileUrl;

      const qr = qrcode(4, 'L');
      qr.addData(mobileUrl);
      qr.make();
      document.getElementById('qr').innerHTML = qr.createImgTag(4);

      // Create non-initiator peer - waits for phone to start the handshake
      let phoneId = null;
      peer = new SimplePeer({
        initiator: false,
        trickle: false,
        config: {
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' }
          ]
        }
      });

      // Registered ONCE - sends answer back to phone
      peer.on('signal', data => {
        if (phoneId) socket.emit('signal', phoneId, data);
      });

      // Receive messages from phone
      peer.on('data', data => {
        const msg = JSON.parse(data.toString());
        if (msg.type === 'buttonClick') {
          console.log('Phone button clicked!', msg);
        }
      });

      peer.on('error', err => console.error('Peer error:', err));

      // Handle incoming offer from the phone
      socket.on('signal', ({ signal, from }) => {
        phoneId = from;
        peer.signal(signal);
      });
    });
  </script>
</body>

</html>
