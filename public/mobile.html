<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Controller</title>
  <style>
    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    #startBtn {
      width: 100vw;
      height: 100vh;
      border: 3px solid #fff;
      background: #000;
      color: #fff;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 0.08em;
    }

    #startBtn:disabled {
      opacity: 0.7;
    }
  </style>
</head>

<body>
  <button id="startBtn" disabled>START</button>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const laptopId = urlParams.get('id');
    const socket = io();
    const startBtn = document.getElementById('startBtn');
    let peer;
    let gyroStarted = false;
    let canRestart = false;

    const startGyroStreaming = () => {
      if (gyroStarted) {
        return;
      }
      gyroStarted = true;

      if (peer && peer.connected) {
        peer.send(JSON.stringify({ type: 'startGame' }));
      }

      startBtn.textContent = 'SURVIVING...';
      startBtn.disabled = true;

      window.addEventListener('deviceorientation', event => {
        if (!peer || !peer.connected) {
          return;
        }
        peer.send(JSON.stringify({
          type: 'gyro',
          beta: event.beta,
          alpha: event.alpha
        }));
      });
    };

    socket.on('connect', () => {
      console.log('Phone connected, Socket ID:', socket.id);

      peer = new SimplePeer({ initiator: true, trickle: false });

      peer.on('signal', data => {
        socket.emit('signal', laptopId, data);
      });

      socket.on('signal', ({ signal }) => {
        peer.signal(signal);
      });

      peer.on('connect', () => {
        startBtn.disabled = false;
      });

      peer.on('data', data => {
        const msg = JSON.parse(data.toString());
        if (msg.type === 'gameOver') {
          canRestart = true;
          startBtn.disabled = false;
          startBtn.textContent = 'RESTART';
        }
      });

      peer.on('error', err => console.error('Peer error:', err));
    });

    startBtn.addEventListener('click', () => {
      if (!peer || !peer.connected) {
        return;
      }

      if (canRestart) {
        canRestart = false;
        startBtn.textContent = 'SURVIVING...';
        startBtn.disabled = true;
        peer.send(JSON.stringify({ type: 'restartGame' }));
        return;
      }

      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        DeviceMotionEvent.requestPermission()
          .then(permission => {
            if (permission !== 'granted') {
              alert('Gyro permission denied.');
              return;
            }
            startGyroStreaming();
          })
          .catch(err => console.error('Permission error:', err));
      } else {
        startGyroStreaming();
      }
    });
  </script>
</body>

</html>
